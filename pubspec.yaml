name: flutter_beep_new
description: >-
  Play system beeps and tones on Android and iOS without bundling sound files.
  Lightweight fork of flutter_beep with modern Gradle, Kotlin, and Swift Package Manager support.
version: 1.2.0
homepage: https://github.com/Segatti/flutter_beep_new
repository: https://github.com/Segatti/flutter_beep_new
issue_tracker: https://github.com/Segatti/flutter_beep_new/issues

# SPDX identifier — must match LICENSE
license: BSD-3-Clause

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.gonoter.flutter_beep
        pluginClass: FlutterBeepPlugin
      ios:
        pluginClass: FlutterBeepPlugin
